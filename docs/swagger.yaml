definitions:
  main.Song:
    properties:
      group:
        type: string
      id:
        type: string
      link:
        type: string
      name:
        type: string
      releaseDate:
        type: string
      text:
        type: string
    type: object
info:
  contact: {}
  title: MusicLibrary Swagger API
  version: "1.0"
paths:
  /songs:
    get:
      description: Получение данных библиотеки с фильтрацией по всем полям и пагинацией
      parameters:
      - description: ID песни
        in: query
        name: id
        type: integer
      - description: Название группы
        in: query
        name: group
        type: string
      - description: Название песни
        in: query
        name: name
        type: string
      - description: Дата релиза
        in: query
        name: releaseDate
        type: string
      - description: Текст песни
        in: query
        name: text
        type: string
      - description: Ссылка
        in: query
        name: link
        type: string
      - description: Номер страницы (по умолчанию 1)
        in: query
        name: page
        type: integer
      - description: Количество записей на странице (по умолчанию 10)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.Song'
            type: array
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get songs with optional filters and pagination
      tags:
      - Songs
    post:
      description: Добавление новой песни с запросом данных о песне из внешнего API
      parameters:
      - description: Название группы
        in: query
        name: group
        required: true
        type: string
      - description: Название песни
        in: query
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.Song'
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Add a new song
      tags:
      - Songs
  /songs/{id}:
    delete:
      description: Удаление песни по ID
      parameters:
      - description: ID песни
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Delete a song
      tags:
      - Songs
    get:
      description: Получение текста песни по ID с пагинацией по куплетам
      parameters:
      - description: ID песни
        in: path
        name: id
        required: true
        type: integer
      - description: Номер страницы (по умолчанию 1)
        in: query
        name: page
        type: integer
      - description: Количество куплетов на странице (по умолчанию 3)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get song lyrics with pagination
      tags:
      - Songs
    put:
      description: Редактирование данных песни по ID, обновляются только переданные
        поля
      parameters:
      - description: ID песни
        in: path
        name: id
        required: true
        type: integer
      - description: Данные для обновления песни
        in: body
        name: song
        required: true
        schema:
          $ref: '#/definitions/main.Song'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Edit an existing song
      tags:
      - Songs
swagger: "2.0"
